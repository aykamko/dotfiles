###############################################################################
# Settings
###############################################################################
set -g base-index 1
set -g renumber-windows on

# 10ms: enough to reassemble escape sequences over SSH, low enough for snappy Escape in vim
set -sg escape-time 10
set -sg repeat-time 0

set -g focus-events on

# constrain window size to the client connected to *that window*, not the session
setw -g aggressive-resize on

# terminal
set -g default-terminal 'xterm-ghostty'
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -ag terminal-overrides ",ghostty:RGB"
set -g set-clipboard on

set -g history-limit 50000

set -ga update-environment ' SSH_TTY VIRTUAL_ENV CONDA_DEFAULT_ENV RBENV_VERSION DOCKER_TLS_VERIFY DOCKER_HOST DOCKER_CERT_PATH DOCKER_MACHINE_NAME'

# prefix
if-shell "[ -z \"$SSH_CONNECTION\" ]" {
  set -g prefix C-Space
  unbind C-b
}

setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string 'tmux #(whoami)@#(hostname --long 2>/dev/null || hostname)'

###############################################################################
# Navigation
###############################################################################
bind r source-file ~/.tmux.conf \; display "tmux conf reloaded!"

# smart pane switching with awareness of vim splits
is_vim='#{m/ri:(^|\/)g?(view|l?n?vim?x?)(diff)?$,#{pane_current_command}}'
bind -n C-h if "$is_vim" { send-keys C-h } { select-pane -L }
bind -n C-j if "$is_vim" { send-keys C-j } { select-pane -D }
bind -n C-k if "$is_vim" { send-keys C-k } { select-pane -U }
bind -n C-l if "$is_vim" { send-keys C-l } { select-pane -R }
bind -n C-Left  select-pane -L
bind -n C-Down  select-pane -D
bind -n C-Up    select-pane -U
bind -n C-Right select-pane -R

# window selection
bind -n C-0 select-window -t :0
bind -n C-1 select-window -t :1
bind -n C-2 select-window -t :2
bind -n C-3 select-window -t :3
bind -n C-4 select-window -t :4
bind -n C-5 select-window -t :5
bind -n C-6 select-window -t :6
bind -n C-7 select-window -t :7
bind -n C-8 select-window -t :8
bind -n C-9 select-window -t :9

# scroll up (forward to curses-like apps, otherwise enter copy mode)
# is_curses_like='#{||:#{alternate_on},#{m/ri:^(less|man|g?(view|l?n?vim?x?)(diff)?)$,#{pane_current_command}}}'
# bind -n C-u if "$is_curses_like" { send-keys C-u } { copy-mode -eu }

###############################################################################
# Panes & Windows
###############################################################################
# split on current directory
bind -r c new-window -c "#{pane_current_path}"
bind -r h split-window -h -b -c "#{pane_current_path}"
bind -r l split-window -h -c "#{pane_current_path}"
bind -r k split-window -v -b -c "#{pane_current_path}"
bind -r j split-window -v -c "#{pane_current_path}"
bind -r % split-window -h -c "#{pane_current_path}"
bind -r '"' split-window -c "#{pane_current_path}"

# resize
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# layouts
bind -r '\' select-layout even-horizontal
bind -r '-' select-layout even-vertical

bind -r b break-pane
bind -r g break-pane -d

# kill pane
bind x if "$is_vim" { send-keys C-x } { kill-pane }
bind / run "kill -9 #{pane_pid}"

###############################################################################
# Copy Mode
###############################################################################
setw -g mode-keys vi
setw -g mode-style bg=colour237
bind Escape copy-mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

set-hook -g pane-mode-changed {
  if -F "#{pane_in_mode}" { select-pane -P bg=#0d0d0d } { select-pane -P bg=default }
}

###############################################################################
# Status Bar
###############################################################################
set -g status-position top
set -g status-style fg=yellow,bg=colour235
set -g status-interval 1
set -g status-justify left
set -g status-right-length 140

set -g status-left " #H "
set -g status-left-style "fg=#ffffff"
set -g status-right '#[fg=blue]#S #[fg=colour15]#(date -u "+%%a %%b %%d %%H:%%M UTC")#[default] '

bind -r y if-shell "[[ $(tmux show-options -v status) = 'on' ]]" { set status off } { set status on }

# window tabs
win_fmt=' #{?window_zoomed_flag,[ZOOM] ,}#{?pane_in_mode,[COPY] ,}#I:#W '
setw -g window-status-format "$win_fmt"
setw -g window-status-current-format "$win_fmt"
setw -g window-status-style fg=colour12,bg=default
setw -g window-status-current-style fg=colour11,bg=colour236

# pane border
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240,bg=default

# message text
set -g message-style bg=colour235,fg=yellow
